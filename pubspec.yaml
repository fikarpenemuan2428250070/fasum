name: fasum
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  image_picker: ^1.2.1
  flutter_image_compress: ^2.4.0
  geolocator: ^14.0.2
  flutter_launcher_icons: ^0.14.4
  intl: ^0.20.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/fasum_icon_512.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/fasum_icon.png
    - assets/fasum_icon_512.png
